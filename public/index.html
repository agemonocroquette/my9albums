<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MY 9 ALBUMS.</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="capture">
  <h1>MY 9 ALBUMS.</h1>
  <p class="subtitle">The nine that made me.</p>
  
<div id="browserWarning"></div>
  <p>
<br>X内ブラウザでは画像を保存できません。
<br>「…」→「ブラウザで開く」で移動してください。
<br>open this page in your browser.
<BR>Tap the "..." menu → Open in browser
  </p>
</div>

  <div class="mode-switch">
  <button id="modeAlbum" class="active">ALBUM</button>
  <button id="modeTrack">TRACK</button>
  <button id="modeArtist">ARTIST</button>
</div>
  <button id="saveBtn">DOWNLOAD</button>
  <button id="previewBtn">PREVIEW</button>
  <button id="shareBtn" style="display:none;">SHARE ON X</button>
<div id="browserWarning" style="display:none;">

  <div id="spotifyDemo" style="text-align:center; margin-bottom:20px;">
    <input type="text" id="albumInput" placeholder="アルバム名を入力">
    <button id="searchBtn">検索</button>
    <br>
  </div>

  <div id="searchResults" style="display:flex; gap:10px; flex-wrap: wrap; justify-content: center; margin-top:10px;"></div>

  <div class="grid">
    <!-- 9枚のカード -->
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
    <div class="card"><button class="remove">×</button><label class="item empty"><input type="file" accept="image/*"><img><span class="plus">+</span></label><div class="title" contenteditable="true"></div></div>
  </div>
</div>

<div id="previewModal" style="display:none;">
  <div class="previewContent">
    <canvas id="previewCanvas"></canvas>
    <button id="closePreview">CLOSE</button>
  </div>
</div>

<script>
  if (navigator.userAgent.includes("Twitter")) {
  document.getElementById("browserWarning").style.display = "block";
}
const modeOptions = ["album", "track", "artist"];
let mode = "album"; // 初期はアルバム
 document.addEventListener("DOMContentLoaded", () => {
  const search = document.getElementById("albumInput");
  const headerTitle = document.querySelector("#capture h1");
  const footerCopyright = document.getElementById("footerCopyright");

const modeButtons = document.querySelectorAll(".mode-switch button");

const shareBtn = document.getElementById("shareBtn");
const previewModal = document.getElementById("previewModal");
const previewCanvas = document.getElementById("previewCanvas");
const closePreview = document.getElementById("closePreview");

shareBtn.addEventListener("click", () => {
  const cards = document.querySelectorAll(".grid .card");
  const top3Titles = Array.from(cards)
    .map(c => c.querySelector(".title").textContent)
    .filter(t => t)          // 空タイトルは無視
    .slice(0, 3);            // 上位3つだけ

  if (top3Titles.length === 0) return alert("カードにタイトルがありません");

  const text = encodeURIComponent(
    `My 9 ${modeOptions.find(m => m === mode)?.toUpperCase()}🎧 #my9music\n` +
    top3Titles.map((t, i) => `${i + 1}. ${t}`).join("\n")
  );
  const url = encodeURIComponent(window.location.href);
  const xShareUrl = `https://x.com/intent/tweet?text=${text}&url=${url}`;
  window.open(xShareUrl, "_blank");
});

function setActiveMode(selectedMode) {
  modeButtons.forEach(btn => btn.classList.remove("active"));
  document.getElementById(`mode${selectedMode.charAt(0).toUpperCase() + selectedMode.slice(1)}`).classList.add("active");
}

document.getElementById("modeAlbum").addEventListener("click", () => {
  mode = "album";
  setActiveMode(mode);
  headerTitle.textContent = "MY 9 ALBUMS.";
  search.placeholder = "アルバム名を入力";
  footerCopyright.textContent = "© 2026 MY 9 ALBUMS.";
});

document.getElementById("modeTrack").addEventListener("click", () => {
  mode = "track";
  setActiveMode(mode);
  headerTitle.textContent = "MY 9 TRACKS.";
  search.placeholder = "曲名を入力";
  footerCopyright.textContent = "© 2026 MY 9 TRACKS.";
});

document.getElementById("modeArtist").addEventListener("click", () => {
  mode = "artist";
  setActiveMode(mode);
  headerTitle.textContent = "MY 9 ARTISTS.";
  search.placeholder = "アーティスト名を入力";
  footerCopyright.textContent = "© 2026 MY 9 ARTISTS.";
});
});


document.addEventListener("DOMContentLoaded", () => {
  const saveBtn = document.getElementById("saveBtn");
  const previewBtn = document.getElementById("previewBtn");
  const search = document.getElementById("albumInput");
  const searchBtn = document.getElementById("searchBtn");
  const resultsDiv = document.getElementById("searchResults");
  const cards = document.querySelectorAll(".grid .card");
  let replaceIndex = 0;
  const shareBtn = document.getElementById("shareBtn");

  // --- ファイル選択で手動追加 ---
  cards.forEach(card => {
    const input = card.querySelector("input[type='file']");
    const img = card.querySelector("img");
    const plus = card.querySelector(".plus");
    const item = card.querySelector(".item");

    input.addEventListener("change", () => {
      const file = input.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = e => {
        img.src = e.target.result;
        item.classList.remove("empty");
        if (plus) plus.style.display = "none";
      };
      reader.readAsDataURL(file);
    });
  });

  // --- Spotify検索（サーバー経由） ---
 searchBtn.addEventListener("click", async () => {
  const queryText = search.value.trim();
  if (!queryText) return alert(`${mode === 'album' ? 'アルバム' : '曲'}名を入力してください`);

  try {
    const res = await fetch(`/api/search?q=${encodeURIComponent(queryText)}&type=${mode}`);
    if (!res.ok) throw new Error("API error");

    const data = await res.json();
    resultsDiv.innerHTML = "";

    let items;
if (mode === "album") items = data.albums.items;
else if (mode === "track") items = data.tracks.items;
else if (mode === "artist") items = data.artists.items;
    if (!items || items.length === 0) return alert(`${mode === 'album' ? 'アルバム' : '曲'}が見つかりませんでした`);

items.forEach(item => {
  const container = document.createElement("div");

  const img = document.createElement("img");
  img.src = mode === "artist" ? (item.images?.[0]?.url || "default_artist.png")
                              : (mode === "album" ? item.images[0].url : item.album?.images[0]?.url || "");
  img.style.width = "100px";
  img.style.height = "100px";

  const title = document.createElement("div");
  title.textContent = item.name;

  const artistDiv = document.createElement("div");
  if (mode !== "artist") {
    artistDiv.textContent = item.artists.map(a => a.name).join(", ");
    artistDiv.style.fontSize = "11px";
    artistDiv.style.color = "#666";
  }

  container.appendChild(img);
  container.appendChild(title);
  if (mode !== "artist") container.appendChild(artistDiv);

  resultsDiv.appendChild(container);

      container.addEventListener("click", () => {
        let targetCard = Array.from(cards).find(c => c.querySelector(".item").classList.contains("empty"));
        if (!targetCard) {
          targetCard = cards[replaceIndex];
          replaceIndex = (replaceIndex + 1) % cards.length;
        }
        targetCard.querySelector("img").src = img.src;
        if (mode === "artist") {
  targetCard.querySelector(".title").textContent = item.name;
} else {
  targetCard.querySelector(".title").textContent = `${item.name} - ${item.artists.map(a => a.name).join(", ")}`;
}
        targetCard.querySelector(".item").classList.remove("empty");
        const plus = targetCard.querySelector(".plus");
        if (plus) plus.style.display = "none";
      });
    });
  } catch (err) {
    console.error(err);
    alert("Spotify APIへの接続に失敗しました");
  }
});

  // --- ドラッグ＆ドロップ ---
  const cardsContainer = document.querySelector(".grid");
  let draggedCard = null;
  cardsContainer.querySelectorAll(".card").forEach(card => {
    card.setAttribute("draggable", true);
    card.addEventListener("dragstart", () => {
      draggedCard = card;
      card.style.opacity = "0.5";
    });
    card.addEventListener("dragend", () => {
      draggedCard = null;
      card.style.opacity = "1";
    });
    card.addEventListener("dragover", e => {
      e.preventDefault();
      card.style.border = "2px dashed #1DB954";
    });
    card.addEventListener("dragleave", () => {
      card.style.border = "none";
    });
    card.addEventListener("drop", e => {
      e.preventDefault();
      card.style.border = "none";
      if (draggedCard && draggedCard !== card) {
        const cardsArray = Array.from(cardsContainer.children);
        const draggedIndex = cardsArray.indexOf(draggedCard);
        const targetIndex = cardsArray.indexOf(card);
        if (draggedIndex < targetIndex) card.after(draggedCard);
        else card.before(draggedCard);
      }
    });
  });

  // DOMContentLoaded の中の処理に追加・修正

// UI要素の表示/非表示を切り替えるヘルパー関数
const toggleUIPanels = (show) => {
    const displayValue = show ? "inline-block" : "none";
    const resultsDisplayValue = show ? "flex" : "none"; // resultsDiv は flex

    search.style.display = displayValue;
    searchBtn.style.display = displayValue;
    resultsDiv.style.display = resultsDisplayValue;
    saveBtn.style.display = displayValue;
    previewBtn.style.display = displayValue;
    // shareBtn はダウンロード後に表示されるべきなので、ここでは制御しない
    // モード切り替えボタンも
    document.getElementById("modeAlbum").style.display = displayValue;
    document.getElementById("modeTrack").style.display = displayValue;
    document.getElementById("modeArtist").style.display = displayValue;
};

// --- ダウンロード ---
saveBtn.addEventListener("click", () => {

  const isMobile = /iPhone|iPad|Android/i.test(navigator.userAgent);

  let newTab = null;

  // スマホの場合は先にタブを開く（ポップアップブロック防止）
  if (isMobile) {
    newTab = window.open("", "_blank");
  }

  toggleUIPanels(false);

  // ×ボタンを非表示
  document.querySelectorAll(".remove").forEach(btn => {
    btn.style.display = "none";
  });

  html2canvas(document.querySelector("#capture"), {
    useCORS: true,
    scale: 2
  }).then(canvas => {

    // ×ボタンを戻す
document.querySelectorAll(".remove").forEach(btn => {
  btn.style.display = "block";
});

    const image = canvas.toDataURL("image/png");

    if (isMobile) {

      // スマホ → 新しいタブに画像表示
      newTab.document.write(`
        <html>
        <head>
          <title>Preview</title>
          <style>
            body{
              margin:0;
              background:#111;
              display:flex;
              align-items:center;
              justify-content:center;
              height:100vh;
              flex-direction:column;
              font-family:sans-serif;
              color:white;
            }
            img{
              max-width:95vw;
              height:auto;
              border-radius:10px;
            }
            p{
              margin-top:15px;
              font-size:14px;
              opacity:0.8;
              text-align:center;
            }
          </style>
        </head>
        <body>
          <img src="${image}">
          <p>長押しして画像を保存<br>Press and hold the image to save</p>
        </body>
        </html>
      `);

      newTab.document.close();

    } else {

      // PC → ダウンロード
      const link = document.createElement("a");
      link.download = "my9music.png";
      link.href = image;
      link.click();

      shareBtn.style.display = "inline-block";

    }

    toggleUIPanels(true);

  });
});

// --- プレビュー ---
previewBtn.addEventListener("click", () => {
    toggleUIPanels(false); // UIを非表示にする

    html2canvas(document.querySelector("#capture"), {useCORS: true}).then(canvas => {
        previewCanvas.width = canvas.width;
        previewCanvas.height = canvas.height;
        const ctx = previewCanvas.getContext("2d");
        ctx.drawImage(canvas, 0, 0);

        // もし保存指示文があるなら非表示にする（プレビュー時は不要）
        const instructionP = document.getElementById("saveInstruction");
        if (instructionP) instructionP.style.display = 'none';

        previewModal.style.display = "flex"; // モーダルを表示
        // プレビュー表示後もUIはモーダルを閉じるときに再表示されるように
    
});


    // UIを再表示
    toggleUIPanels(true);
    // モーダルを閉じた後にシェアボタンを表示するかどうかは、ダウンロードからの流れであれば表示。
    // プレビューだけなら表示しない。
    // ここでは、もしダウンロード処理でモーダルを使った場合にも対応できるよう、
    // シェアボタンは常にここで表示する方針とする
    shareBtn.style.display = "inline-block";
});

  // --- 削除ボタン ---
document.querySelectorAll(".remove").forEach(btn => {

  btn.addEventListener("click", () => {

    const card = btn.closest(".card")

    const img = card.querySelector("img")
    const title = card.querySelector(".title")
    const item = card.querySelector(".item")
    const plus = card.querySelector(".plus")

    img.src = ""
    title.textContent = ""

    item.classList.add("empty")

    if(plus) plus.style.display = "block"

  })

})

});


</script>
