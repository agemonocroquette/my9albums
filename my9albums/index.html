<!DOCTYPE html>
<html lang="ja">
<head>

<body>

 <div id="capture">

    <h1>MY 9 ALBUMS.</h1>
    <p class="subtitle">The nine that made me.</p>
    <button id="saveBtn">DOWNLOAD</button>
    <button id="shareBtn" style="display:none;">SHARE ON X</button>

<div class="grid">

  </div>
</div>

  </div>

<script>
  const shareBtn = document.getElementById("shareBtn");
  const inputs = document.querySelectorAll("input[type='file']");
  const saveBtn = document.getElementById("saveBtn");

  inputs.forEach(input => {
    input.addEventListener("change", function() {
      const file = this.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          input.parentElement.style.backgroundImage = `url(${e.target.result})`;
          input.parentElement.style.backgroundSize = "cover";
          input.parentElement.style.backgroundPosition = "center";
        }
        reader.readAsDataURL(file);
      }
    });
  });

  saveBtn.addEventListener("click", () => {
  saveBtn.style.display = "none";

  html2canvas(document.querySelector("#capture")).then(canvas => {
    const link = document.createElement("a");
    link.download = "my9albums.png";
    link.href = canvas.toDataURL();
    link.click();

    saveBtn.style.display = "inline-block";
    shareBtn.style.display = "inline-block"; // ← 追加
  });
});

shareBtn.addEventListener("click", () => {
  const text = encodeURIComponent(
    `These are the 9 albums that made me 🎧

Create yours here ↓
${SITE_URL}

#MY9ALBUMS`
  );
  const url = "https://twitter.com/intent/tweet?text=" + text;
  window.open(url, "_blank");
});

</script>
</body>
</html>
